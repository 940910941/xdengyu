<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xdengyu.com — Coming Soon</title>
<meta name="description" content="Building something exciting. Like a SpaceX rocket, we're going full speed.">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at top, #1a1a2e 0%, #0f0f1e 50%, #000 100%);
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    overflow: hidden;
    position: relative;
  }

  .stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 60% 70%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 80% 20%, #fff, transparent),
      radial-gradient(1px 1px at 40% 80%, #fff, transparent),
      radial-gradient(2px 2px at 90% 60%, #fff, transparent),
      radial-gradient(1px 1px at 15% 85%, #fff, transparent),
      radial-gradient(1px 1px at 50% 50%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 70% 40%, #fff, transparent);
    background-size: 200% 200%;
    animation: twinkle 4s ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .container {
    position: relative;
    z-index: 1;
    padding: 2rem;
  }

  .rocket {
    font-size: 5rem;
    margin-bottom: 1rem;
    display: inline-block;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-5deg); }
    50% { transform: translateY(-15px) rotate(5deg); }
  }

  h1 {
    font-size: clamp(2.5rem, 8vw, 4.5rem);
    font-weight: 800;
    background: linear-gradient(135deg, #fff 0%, #00d4ff 50%, #a855f7 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 1.2rem;
    color: #00d4ff;
    margin-bottom: 2rem;
    font-weight: 300;
    letter-spacing: 0.4em;
    text-transform: uppercase;
  }

  .description {
    font-size: 1.05rem;
    color: #aaa;
    max-width: 480px;
    line-height: 1.7;
    margin: 0 auto 2rem;
  }

  .contacts {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 1rem;
  }

  .contact {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.75rem 1.6rem;
    border: 1px solid #00d4ff;
    border-radius: 100px;
    color: #00d4ff;
    text-decoration: none;
    transition: all 0.3s;
    font-size: 0.95rem;
  }

  .contact.qq {
    border-color: #a855f7;
    color: #a855f7;
  }

  .contact.qq:hover {
    background: #a855f7;
    color: #fff;
    box-shadow: 0 8px 20px rgba(168, 85, 247, 0.3);
  }

  .contact:hover {
    background: #00d4ff;
    color: #000;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
  }

  .signal {
    margin-top: 3rem;
    color: #555;
    font-size: 0.8rem;
    letter-spacing: 0.3em;
  }

  .signal .dot {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #00ff9d;
    border-radius: 50%;
    margin-right: 0.5rem;
    box-shadow: 0 0 8px #00ff9d;
    animation: pulse 2s infinite;
    vertical-align: middle;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
</style>
</head>
<body>
  <div class="stars"></div>
  <div class="container">
    <div class="rocket">🚀</div>
    <h1>xdengyu.com</h1>
    <div class="subtitle">Coming Soon</div>
    <p class="description">
      正在构建一些激动人心的东西。<br>
      就像 SpaceX 的火箭一样，我们正在全速前进。
    </p>
    <div class="contacts">
      <a href="mailto:hello@xdengyu.com" class="contact">📬 hello@xdengyu.com</a>
      <a href="tencent://message/?uin=940910941&Site=&Menu=yes" class="contact qq">💬 QQ 940910941</a>
    </div>
    <div class="signal">
      <span class="dot"></span>SIGNAL ACQUIRED · 2026
    </div>
  </div>
</body>
</html>
